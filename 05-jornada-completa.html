<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jornada Completa - Comparativo das 3 Rotas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #ffffff;
            color: #1e293b;
            line-height: 1.6;
        }
        
        .container { max-width: 1400px; margin: 0 auto; padding: 3rem 2rem; }
        
        .page-header {
            text-align: center;
            margin-bottom: 3rem;
            padding-bottom: 2rem;
            border-bottom: 2px solid #e2e8f0;
        }
        
        .page-header h1 {
            font-size: 2.25rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 0.75rem;
            letter-spacing: -0.03em;
        }
        
        .page-header p {
            font-size: 1.125rem;
            color: #64748b;
        }
        
        .section-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #0f172a;
            margin: 3rem 0 2rem;
            letter-spacing: -0.02em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <h1>Jornada Completa do Cliente</h1>
            <p>Comparativo visual das 3 rotas: Premium, Downsell e Nutrição</p>
        </div>
        
        <h2 class="section-title">Timeline Comparativa</h2>
        
        <!-- Diagrama Timeline Profissional -->
        <div style="background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 2rem; margin: 2rem 0;">
            <svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" style="width: 100%; max-width: 1200px; height: auto; display: block; margin: 0 auto;">
                <defs>
                    <!-- Gradientes -->
                    <linearGradient id="gradGreen" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradOrange" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
                    </linearGradient>
                    <linearGradient id="gradPurple" x1="0%" y1="0%" x2="0%" y2="100%">
                        <stop offset="0%" style="stop-color:#8b5cf6;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
                    </linearGradient>
                    
                    <!-- Sombras -->
                    <filter id="shadow1">
                        <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                        <feOffset dx="0" dy="2"/>
                        <feComponentTransfer>
                            <feFuncA type="linear" slope="0.2"/>
                        </feComponentTransfer>
                        <feMerge>
                            <feMergeNode/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                </defs>
                
                <!-- Linha do tempo central -->
                <line x1="100" y1="350" x2="1100" y2="350" stroke="#cbd5e1" stroke-width="3"/>
                
                <!-- Marcadores de tempo -->
                <circle cx="100" cy="350" r="8" fill="#3b82f6" filter="url(#shadow1)"/>
                <text x="100" y="375" text-anchor="middle" font-family="Inter" font-size="10" font-weight="600" fill="#64748b">Dia 0</text>
                
                <circle cx="300" cy="350" r="8" fill="#3b82f6" filter="url(#shadow1)"/>
                <text x="300" y="375" text-anchor="middle" font-family="Inter" font-size="10" font-weight="600" fill="#64748b">Dia 5</text>
                
                <circle cx="550" cy="350" r="8" fill="#3b82f6" filter="url(#shadow1)"/>
                <text x="550" y="375" text-anchor="middle" font-family="Inter" font-size="10" font-weight="600" fill="#64748b">Dia 30</text>
                
                <circle cx="800" cy="350" r="8" fill="#3b82f6" filter="url(#shadow1)"/>
                <text x="800" y="375" text-anchor="middle" font-family="Inter" font-size="10" font-weight="600" fill="#64748b">Dia 120</text>
                
                <circle cx="1050" cy="350" r="8" fill="#3b82f6" filter="url(#shadow1)"/>
                <text x="1050" y="375" text-anchor="middle" font-family="Inter" font-size="10" font-weight="600" fill="#64748b">Dia 365</text>
                
                <!-- ===== JORNADA PREMIUM (TOPO) ===== -->
                <rect x="80" y="50" width="80" height="26" rx="6" fill="url(#gradGreen)" opacity="0.2"/>
                <text x="120" y="68" text-anchor="middle" font-family="Inter" font-size="11" font-weight="700" fill="#059669">PREMIUM</text>
                
                <!-- Diagnóstico -->
                <rect x="90" y="90" width="140" height="70" rx="10" fill="url(#gradGreen)" filter="url(#shadow1)"/>
                <rect x="90" y="90" width="140" height="70" rx="10" fill="none" stroke="#047857" stroke-width="1" opacity="0.3"/>
                <text x="160" y="115" text-anchor="middle" fill="white" font-family="Inter" font-size="13" font-weight="700" letter-spacing="-0.02em">Diagnóstico</text>
                <text x="160" y="135" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85">Score alto</text>
                <text x="160" y="150" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85">≥100k/mês</text>
                <line x1="160" y1="160" x2="160" y2="340" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
                
                <!-- Reunião -->
                <rect x="250" y="90" width="140" height="70" rx="10" fill="url(#gradGreen)" filter="url(#shadow1)"/>
                <rect x="250" y="90" width="140" height="70" rx="10" fill="none" stroke="#047857" stroke-width="1" opacity="0.3"/>
                <rect x="260" y="100" width="60" height="20" rx="5" fill="white" opacity="0.2"/>
                <text x="290" y="114" text-anchor="middle" font-family="Inter" font-size="9" font-weight="700" fill="white">AÇÃO</text>
                <text x="320" y="135" text-anchor="middle" fill="white" font-family="Inter" font-size="13" font-weight="700" letter-spacing="-0.02em">Reunião 1:1</text>
                <text x="320" y="150" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85">Estratégica</text>
                <line x1="320" y1="160" x2="320" y2="340" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
                
                <!-- Fechamento -->
                <rect x="430" y="90" width="140" height="70" rx="10" fill="url(#gradGreen)" filter="url(#shadow1)"/>
                <rect x="430" y="90" width="140" height="70" rx="10" fill="none" stroke="#047857" stroke-width="1" opacity="0.3"/>
                <rect x="440" y="100" width="80" height="20" rx="5" fill="white" opacity="0.2"/>
                <text x="480" y="114" text-anchor="middle" font-family="Inter" font-size="9" font-weight="700" fill="white">RESULTADO</text>
                <text x="500" y="135" text-anchor="middle" fill="white" font-family="Inter" font-size="13" font-weight="700" letter-spacing="-0.02em">Fechamento</text>
                <text x="500" y="150" text-anchor="middle" fill="white" font-family="Inter" font-size="11" font-weight="700">$$$$$</text>
                <line x1="500" y1="160" x2="500" y2="340" stroke="#10b981" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
                
                <!-- Acompanhamento -->
                <rect x="620" y="90" width="200" height="70" rx="10" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="2"/>
                <text x="720" y="120" text-anchor="middle" fill="#047857" font-family="Inter" font-size="12" font-weight="700">Mentorias Contínuas</text>
                <text x="720" y="140" text-anchor="middle" fill="#059669" font-family="Inter" font-size="10" font-weight="500">Cross-sell + Upsell</text>
                <text x="720" y="155" text-anchor="middle" fill="#059669" font-family="Inter" font-size="10" font-weight="600">LTV: R$ 36k - R$ 120k</text>
                
                <!-- ===== JORNADA DOWNSELL (MEIO) ===== -->
                <rect x="80" y="240" width="85" height="26" rx="6" fill="url(#gradOrange)" opacity="0.2"/>
                <text x="122" y="258" text-anchor="middle" font-family="Inter" font-size="11" font-weight="700" fill="#d97706">DOWNSELL</text>
                
                <!-- Diagnóstico -->
                <rect x="90" y="280" width="140" height="70" rx="10" fill="url(#gradOrange)" filter="url(#shadow1)"/>
                <rect x="90" y="280" width="140" height="70" rx="10" fill="none" stroke="#b45309" stroke-width="1" opacity="0.3"/>
                <text x="160" y="305" text-anchor="middle" fill="white" font-family="Inter" font-size="13" font-weight="700" letter-spacing="-0.02em">Diagnóstico</text>
                <text x="160" y="325" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85">Score médio</text>
                <text x="160" y="340" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85"><100k/mês</text>
                <line x1="160" y1="315" x2="160" y2="345" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
                
                <!-- Emails -->
                <rect x="250" y="280" width="140" height="70" rx="10" fill="url(#gradOrange)" filter="url(#shadow1)"/>
                <rect x="250" y="280" width="140" height="70" rx="10" fill="none" stroke="#b45309" stroke-width="1" opacity="0.3"/>
                <text x="320" y="305" text-anchor="middle" fill="white" font-family="Inter" font-size="13" font-weight="700" letter-spacing="-0.02em">7 Emails</text>
                <text x="320" y="325" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85">Educacionais</text>
                <text x="320" y="340" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85">Personalizado</text>
                <line x1="320" y1="315" x2="320" y2="345" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
                
                <!-- Primeira compra -->
                <rect x="430" y="280" width="140" height="70" rx="10" fill="url(#gradOrange)" filter="url(#shadow1)"/>
                <rect x="430" y="280" width="140" height="70" rx="10" fill="none" stroke="#b45309" stroke-width="1" opacity="0.3"/>
                <rect x="440" y="290" width="80" height="20" rx="5" fill="white" opacity="0.2"/>
                <text x="480" y="304" text-anchor="middle" font-family="Inter" font-size="9" font-weight="700" fill="white">CONVERSÃO</text>
                <text x="500" y="325" text-anchor="middle" fill="white" font-family="Inter" font-size="13" font-weight="700" letter-spacing="-0.02em">1ª Compra</text>
                <text x="500" y="340" text-anchor="middle" fill="white" font-family="Inter" font-size="11" font-weight="700">$ - $$</text>
                <line x1="500" y1="315" x2="500" y2="345" stroke="#f59e0b" stroke-width="2" opacity="0.4"/>
                
                <!-- Upgrades -->
                <rect x="620" y="280" width="200" height="70" rx="10" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="2"/>
                <text x="720" y="310" text-anchor="middle" fill="#b45309" font-family="Inter" font-size="12" font-weight="700">Upgrades Graduais</text>
                <text x="720" y="330" text-anchor="middle" fill="#d97706" font-family="Inter" font-size="10" font-weight="500">Escada de valor</text>
                <text x="720" y="345" text-anchor="middle" fill="#d97706" font-family="Inter" font-size="10" font-weight="600">LTV: R$ 1.5k - R$ 6k</text>
                
                <!-- ===== JORNADA NUTRIÇÃO (BASE) ===== -->
                <rect x="80" y="430" width="75" height="26" rx="6" fill="url(#gradPurple)" opacity="0.2"/>
                <text x="117" y="448" text-anchor="middle" font-family="Inter" font-size="11" font-weight="700" fill="#7c3aed">NUTRIÇÃO</text>
                
                <!-- Diagnóstico -->
                <rect x="90" y="470" width="140" height="70" rx="10" fill="url(#gradPurple)" filter="url(#shadow1)"/>
                <rect x="90" y="470" width="140" height="70" rx="10" fill="none" stroke="#6d28d9" stroke-width="1" opacity="0.3"/>
                <text x="160" y="495" text-anchor="middle" fill="white" font-family="Inter" font-size="13" font-weight="700" letter-spacing="-0.02em">Diagnóstico</text>
                <text x="160" y="515" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85">Qualquer perfil</text>
                <text x="160" y="530" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85">Não comprou</text>
                <line x1="160" y1="540" x2="160" y2="355" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
                
                <!-- Conteúdo -->
                <rect x="250" y="470" width="280" height="70" rx="10" fill="url(#gradPurple)" filter="url(#shadow1)"/>
                <rect x="250" y="470" width="280" height="70" rx="10" fill="none" stroke="#6d28d9" stroke-width="1" opacity="0.3"/>
                <text x="390" y="495" text-anchor="middle" fill="white" font-family="Inter" font-size="13" font-weight="700" letter-spacing="-0.02em">Conteúdo Contínuo</text>
                <text x="390" y="515" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85">25 combinações personalizadas</text>
                <text x="390" y="530" text-anchor="middle" fill="white" font-family="Inter" font-size="10" font-weight="500" opacity="0.85">Requalificação trimestral</text>
                <line x1="390" y1="540" x2="390" y2="355" stroke="#8b5cf6" stroke-width="2" stroke-dasharray="4,4" opacity="0.4"/>
                
                <!-- Conversão lenta -->
                <rect x="620" y="470" width="200" height="70" rx="10" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="2"/>
                <text x="720" y="500" text-anchor="middle" fill="#6d28d9" font-family="Inter" font-size="12" font-weight="700">Conversão Orgânica</text>
                <text x="720" y="520" text-anchor="middle" fill="#7c3aed" font-family="Inter" font-size="10" font-weight="500">5-8% acumulado</text>
                <text x="720" y="535" text-anchor="middle" fill="#7c3aed" font-family="Inter" font-size="10" font-weight="600">LTV: R$ 400 - R$ 3k</text>
                
                <!-- Badge LTV Total -->
                <rect x="900" y="310" width="240" height="90" rx="10" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow1)"/>
                <text x="1020" y="340" text-anchor="middle" font-family="Inter" font-size="14" font-weight="700" fill="#0f172a" letter-spacing="-0.02em">LTV MÉDIO 12 MESES</text>
                <text x="950" y="365" text-anchor="start" font-family="Inter" font-size="11" fill="#059669" font-weight="600">Premium: R$ 36k - R$ 120k</text>
                <text x="950" y="382" text-anchor="start" font-family="Inter" font-size="11" fill="#d97706" font-weight="600">Downsell: R$ 1.5k - R$ 6k</text>
                <text x="950" y="399" text-anchor="start" font-family="Inter" font-size="11" fill="#7c3aed" font-weight="600">Nutrição: R$ 400 - R$ 3k</text>
                
                <!-- Legenda -->
                <rect x="400" y="665" width="400" height="20" rx="10" fill="#f1f5f9"/>
                <text x="600" y="679" text-anchor="middle" font-family="Inter" font-size="9" fill="#64748b" font-weight="600">$ = R$97-297 | $$ = R$297-497 | $$$ = R$497-997 | $$$$ = R$1k-3k | $$$$$ = R$3k-10k+</text>
            </svg>
        </div>
    </div>
</body>
</html>
